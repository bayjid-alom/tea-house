<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font Manrope-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            font-family: "Manrope", sans-serif;
        }
    </style>
    <title>Tea House</title>
</head>

<body>

    <section
        class="grid grid-cols-1 md:grid-cols-2 container md:container mx-auto pt-8 md:pt-[68px] max-w-[94%] md:max-w-[98%]  ml-[]">

        <div class="banner-left">
            <h2 class="md:text-[80px] text-[60px] font-bold">It's good <br>
                tea time at The <br> Tea House</h2>
            <p class="text-[#777777] my-[30px]">Tea and Botanical Solutions Supplier Give Optimum <br> Satisfaction To
                Your Taste Buds.</p>
            <button
                class="py-3 px-5 rounded-md font-semibold text-white  bg-gradient-to-r from-[#FF8938] to-[#FF0000] transition-all duration-300 hover:-translate-y-[4px]">Explore
                More <i class="fa-solid fa-arrow-right -rotate-45 inline-block "></i></button>
        </div>


        <div class="banner-right flex justify-end items-end relative ">
            <img src="./assets/banner.png" alt="">

            <!-- rating div -->
            <div
                class="flex justify-center w-[255px] absolute bg-white  rounded-md shadow-2xl gap-4  py-[18px] px-[27px] items-center bottom-[15px] left-[220px]">

                <img class="w-[48px] h-[48px] " src="./assets/rating-star.png" alt="">
                <div>
                    <h2 class="font-bold text-black text-[30px]">5.00</h2>
                    <p class="text-[#777777]">Trust Pilot Ratings</p>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
